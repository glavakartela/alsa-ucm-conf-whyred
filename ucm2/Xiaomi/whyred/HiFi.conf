SectionVerb {
        EnableSequence [
                cdev "hw:${CardId}"

                cset "name='INT0_MI2S_RX Audio Mixer MultiMedia1' 1"
                cset "name='MultiMedia1 Mixer INT3_MI2S_TX' 1"
        ]

        DisableSequence [
                cdev "hw:${CardId}"

                cset "name='INT0_MI2S_RX Audio Mixer MultiMedia1' 0"
                cset "name='MultiMedia1 Mixer INT3_MI2S_TX' 0"
        ]

        Value {
                TQ "HiFi"
                PulseAudioSinkModargs "ignore_dB=yes"
                PlaybackPCM "hw:${CardId},0"
                CapturePCM "hw:${CardId},0"
        }

}

SectionDevice."Earpiece" {
        Comment "Handset Rx device"

        ConflictingDevice [
                "Headphones"
        ]

        EnableSequence [
                cdev "hw:${CardId}"

                cset "name='RX1 MIX1 INP1' RX1"
                cset "name='RDAC2 MUX' RX1"
                cset "name='RX1 Digital Volume' 83"
                cset "name='EAR PA Gain' POS_6_DB"
                cset "name='EAR_S' Switch"
        ]

        DisableSequence [
                cdev "hw:${CardId}"

                cset "name='RX1 MIX1 INP1' ZERO"
                cset "name='RDAC2 MUX' ZERO"
                cset "name='RX1 Digital Volume' 84"
                cset "name='EAR PA Gain' POS_1P5_DB"
                cset "name='EAR_S' ZERO"
        ]

        Value {
                PlaybackChannels "2"
        }

}

SectionDevice."Speaker" {
        Comment "Speaker Rx device"

        ConflictingDevice [
                "Earpiece"
        ]

        EnableSequence [
                cdev "hw:${CardId}"

        ]

        DisableSequence [
                cdev "hw:${CardId}d"

                cset "name='RX3 Digital Volume' 84"
        ]

        Value {
                PlaybackChannels "2"
                PlaybackVolume "RX3 Digital"
        }

}

SectionDevice."Headphones" {
        Comment "Headset Rx device"

        ConflictingDevice [
                "Earpiece"
        ]

        EnableSequence [
                cdev "hw:${CardId}d"

                cset "name='INT0_MI2S_RX Channels' Two"
                cset "name='RX1 MIX1 INP1' RX1"
                cset "name='RX2 MIX1 INP1' RX2"
                cset "name='RDAC2 MUX' RX2"
                cset "name='RX HPH Mode' HD2"
                cset "name='HPHL' Switch"
                cset "name='HPHR' Switch"
        ]

        DisableSequence [
                cdev "hw:${CardId}"

                cset "name='INT0_MI2S_RX Channels' One"
                cset "name='RX1 MIX1 INP1' ZERO"
                cset "name='RX2 MIX1 INP1' ZERO"
                cset "name='RDAC2 MUX' ZERO"
                cset "name='RX HPH Mode' NORMAL"
                cset "name='HPHL' ZERO"
                cset "name='HPHR' ZERO"
        ]

        Value {
                PlaybackChannels "2"
        }

}

SectionDevice."HeadsetMic" {
        Comment "Headset Tx device"

        ConflictingDevice [
                "HandsetMic"
        ]

        EnableSequence [
                cdev "hw:${CardId}"

                cset "name='ADC2 Volume' 6"
                cset "name='DEC1 MUX' ADC2"
                cset "name='ADC2 MUX' INP2"
                cset "name='IIR1 INP1 MUX' DEC1"
        ]

        DisableSequence [
                cdev "hw:${CardId}"

                cset "name='ADC2 Volume' 4"
                cset "name='DEC1 MUX' ZERO"
                cset "name='ADC2 MUX' INP3"
                cset "name='IIR1 INP1 MUX' ZERO"
        ]

        Value {
                CaptureChannels "1"
        }

}

SectionDevice."HandsetMic" {
        Comment "Handset Tx device"

        ConflictingDevice [
                "HeadsetMic"
        ]

        EnableSequence [
                cdev "hw:${CardId}"

                cset "name='ADC1 Volume' 6"
                cset "name='DEC1 MUX' ADC1"
                cset "name='ADC1_INP1 Switch' 1"
                cset "name='IIR1 INP1 MUX' DEC1"
        ]

        DisableSequence [
                cdev "hw:${CardId}"

                cset "name='ADC1 Volume' 4"
                cset "name='DEC1 MUX' ZERO"
                cset "name='ADC1_INP1 Switch' 1"
                cset "name='IIR1 INP1 MUX' ZERO"
        ]

        Value {
                CaptureChannels "1"
        }

}

SectionModifier."PlayVoice" {
        Comment "Low latency path for voice"

        SupportedDevice [
                "Earpiece"
                "Headphones"
                "Speaker"
        ]

        EnableSequence [
                cdev "hw:${CardId}"

                cset "name='INT0_MI2S_RX Audio Mixer MultiMedia5' 1"
        ]

        DisableSequence [
                cdev "hw:${CardId}"

                cset "name='INT0_MI2S_RX Audio Mixer MultiMedia5' 0"
        ]

        Value {
                PulseAudioSinkModargs "ignore_dB=yes tsched_buffer_size=1920"
                PlaybackPCM "hw:${CardId},14"
                CapturePCM "hw:${CardId},14"
        }

}

